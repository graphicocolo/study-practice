<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>動的なリスト表示（配列→HTML）</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/basecoat.cdn.min.css">
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/all.min.js" defer></script>
  <script src="taskList.js" defer></script>
</head>
<body>
  <div class="p-4">
    <h1 class="text-2xl font-bold mb-6 text-center">動的なリスト表示（配列→HTML）</h1>
    <form id="task-form">
      <div class="m-auto form mb-8 md:max-w-xl grid gap-4">
        <div>
          <label class="text-sm font-medium mb-2">追加するタスクを入力</label>
          <input type="text" name="task" placeholder="タスク内容" class="input flex-1" id="task-input">
          <p id="task-input-error" class="text-red-500 text-sm mt-2"></p>
        </div>
      </div>
      <div class="m-auto md:max-w-xs grid gap-4">
        <button type="submit" class="btn btn-primary font-bold text-base">タスクを追加</button>
        <button type="reset" class="btn btn-secondary font-bold text-base text-white bg-neutral-500">リセット</button>
      </div>
    </form>
    <div id="display-list" class="m-auto md:max-w-xl mt-10">
      
    </div>
  </div>
</body>
</html>
