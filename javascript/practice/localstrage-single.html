<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ローカルストレージへの読み書き - 単一のメモ</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/basecoat.cdn.min.css">
  <script src="https://cdn.jsdelivr.net/npm/basecoat-css@0.3.11/dist/js/all.min.js" defer></script>
  <script src="localStorageSingle.js" defer></script>
</head>
<body>
  <div class="m-auto max-w-sm p-4">
    <h1 class="text-2xl font-bold mb-6">ローカルストレージへの読み書き - 単一のメモ</h1>
    <form id="memo-form" class="form grid gap-6">
      <div class="grid gap-2 mb-1">
        <label for="memo" class="form-label text-base">メモ</label>
        <textarea name="memo" id="memo" class="form-control" placeholder="メモを入力してください"></textarea>
      </div>
      <button type="submit" class="btn btn-primary font-bold text-base bg-sky-600">保存する</button>
      <button type="reset" class="btn btn-secondary font-bold text-base text-white bg-neutral-500">リセット</button>
    </form>
    <p id="status"></p>
    <a href="index.html" class="mt-6 inline-block text-blue-500 hover:text-blue-700">課題トップへ</a>
  </div>
</body>
</html>
